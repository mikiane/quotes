<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspirational Quotes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 720px;
            width: 100%;
        }

        .quote-icon {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 1.5rem;
            user-select: none;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.4rem);
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        .quote-author {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.4s forwards;
            color: rgba(255, 255, 255, 0.6);
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            margin: 1.5rem auto;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.2s forwards;
        }

        .new-quote-btn {
            margin-top: 2.5rem;
            padding: 0.8rem 2.2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.6s forwards;
        }

        .new-quote-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .new-quote-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fade-out {
            animation: fadeOut 0.3s ease forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(-10px); }
        }

        @media (max-width: 480px) {
            body { padding: 1.5rem; }
            .quote-icon { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quote-icon">&#8222;</div>
        <p class="quote-text" id="quote-text"></p>
        <div class="divider"></div>
        <p class="quote-author" id="quote-author"></p>
        <button class="new-quote-btn" id="new-quote-btn">New Quote</button>
    </div>

    <script>
        const quotes = [
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "In the middle of difficulty lies opportunity.", author: "Albert Einstein" },
            { text: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle" },
            { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
            { text: "You must be the change you wish to see in the world.", author: "Mahatma Gandhi" },
            { text: "The unexamined life is not worth living.", author: "Socrates" },
            { text: "Imagination is more important than knowledge.", author: "Albert Einstein" },
            { text: "Strive not to be a success, but rather to be of value.", author: "Albert Einstein" },
            { text: "Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.", author: "Albert Einstein" },
            { text: "That which does not kill us makes us stronger.", author: "Friedrich Nietzsche" },
            { text: "To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.", author: "Ralph Waldo Emerson" },
            { text: "The mind is everything. What you think, you become.", author: "Buddha" },
            { text: "Not all those who wander are lost.", author: "J.R.R. Tolkien" },
            { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
            { text: "Knowing yourself is the beginning of all wisdom.", author: "Aristotle" },
            { text: "We cannot solve our problems with the same thinking we used when we created them.", author: "Albert Einstein" },
            { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela" },
            { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
            { text: "The purpose of our lives is to be happy.", author: "Dalai Lama" },
            { text: "Get busy living or get busy dying.", author: "Stephen King" },
            { text: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas Edison" },
            { text: "A person who never made a mistake never tried anything new.", author: "Albert Einstein" },
            { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
            { text: "Everything you've ever wanted is on the other side of fear.", author: "George Addair" },
            { text: "Act as if what you do makes a difference. It does.", author: "William James" },
            { text: "What you get by achieving your goals is not as important as what you become by achieving your goals.", author: "Zig Ziglar" },
            { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
            { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
            { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
            { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
            { text: "In three words I can sum up everything I've learned about life: it goes on.", author: "Robert Frost" },
            { text: "To live is the rarest thing in the world. Most people exist, that is all.", author: "Oscar Wilde" },
            { text: "Turn your wounds into wisdom.", author: "Oprah Winfrey" },
            { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
            { text: "Fall seven times and stand up eight.", author: "Japanese Proverb" },
            { text: "The only limit to our realization of tomorrow is our doubts of today.", author: "Franklin D. Roosevelt" },
            { text: "Creativity is intelligence having fun.", author: "Albert Einstein" },
            { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
            { text: "What lies behind us and what lies before us are tiny matters compared to what lies within us.", author: "Ralph Waldo Emerson" },
            { text: "If you want to lift yourself up, lift up someone else.", author: "Booker T. Washington" }
        ];

        let lastIndex = -1;

        function getRandomQuote() {
            let index;
            do {
                index = Math.floor(Math.random() * quotes.length);
            } while (index === lastIndex && quotes.length > 1);
            lastIndex = index;
            return quotes[index];
        }

        function displayQuote() {
            const quoteText = document.getElementById('quote-text');
            const quoteAuthor = document.getElementById('quote-author');

            quoteText.classList.add('fade-out');
            quoteAuthor.classList.add('fade-out');

            setTimeout(() => {
                const quote = getRandomQuote();
                quoteText.textContent = quote.text;
                quoteAuthor.textContent = "\u2014 " + quote.author;
                quoteText.classList.remove('fade-out');
                quoteAuthor.classList.remove('fade-out');
                quoteText.style.animation = 'none';
                quoteAuthor.style.animation = 'none';
                void quoteText.offsetWidth;
                quoteText.style.animation = 'fadeIn 0.8s ease forwards';
                quoteAuthor.style.animation = 'fadeIn 0.8s ease 0.4s forwards';
            }, 300);
        }

        const initialQuote = getRandomQuote();
        document.getElementById('quote-text').textContent = initialQuote.text;
        document.getElementById('quote-author').textContent = "\u2014 " + initialQuote.author;

        document.getElementById('new-quote-btn').addEventListener('click', displayQuote);
    </script>
</body>
</html>
